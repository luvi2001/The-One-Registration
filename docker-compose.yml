version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: camp-registration-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: camp_user
      POSTGRES_PASSWORD: camp_password
      POSTGRES_DB: camp_registration
    ports:
      - "5432:5432"
    volumes:
      - camp_postgres_data:/var/lib/postgresql/data

volumes:
  camp_postgres_data:
